<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Password | Secure Vault for Employees</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>



    <nav class ="navbar">
        <div class = "logo">EDIT SECURITY DETAILS FOR EMPLOYEES</div>

        <div class = "nav-links">
            <a href = "/dashboard">Dashboard</a>
            <a href = "/save-password">Save Password</a>
            <a href ="/logout">Logout</a>

        </div>
    </nav>

    <section class = "authorization-page">
        <div class="authorization-left">
            <h1>Update saved password details</h1>
            <p>
                Edit an existing vault entry and keep your work related credentials accurate and secure.
            </p>

        </div>

        <div class="authorization-card">
            <h2>Edit Password</h2>
            <p class="subtitle">Update the account details below.</p>

            <form method="POST" action="/edit-password/{{password['id']}}">
                <div class="form-group">
                    <label for="service">Service name</label>
                   <input
                        type="text"
                        id="service"
                        name="service_name"
                        placeholder="Example: Company Email, HR Portal"
                        value="{{ password['service_name'] }}"
                        required>
                </div>


                
                <div class="form-group">
                    <label for="username">Username / Email</label>
                   <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter username or email"
                        value="{{ password['username'] }}"
                        required>
                </div>



                <div class="form-group">
                    <label for="password">Password</label>
                   <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter username password to save"
                        value="{{ password['decrypted_password'] }}"
                        required>
                </div>



                <div class="form-group">
                    <label for="notes">Notes</label>
                   <input
                        type="text"
                        id="notes"
                        name="notes"
                        placeholder="Optional notes"
                        value="Work email account">
                       
                </div>


                <button type="submit" class="btn-primary">Update Password</button>

            </form>


            <p class="authorization-link">
                <a href="/dashboard">Back to the Dashboard</a>

            </p>

        </div>

    </section>
    
</body>
</html>
