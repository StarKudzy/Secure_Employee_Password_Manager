<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Employee Password Manager</title>
   <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class = "navbar">
        <div class="logo">SECURE <span>VAULT FOR EMPLOYEES</span></div>

            <div class="nav-links">
                <a href="register.html">Home</a>
                <a href="login.html">Login</a>
            </div>

        </div>
    </nav>

    <section class = "authorization-page">
        <div class = "authorization-left">
            <h1>
                Secure your company credentials here.
            </h1>
            <p>
                Create an account to store, manage and protect your work-related passwords using encrypted credential storage.
            </p>

        </div>

        <div class = "authorization-card">
            <h2> Create Account</h2>
            <p class ="subtitle"> Register to access your password vault. </p>


            <form method = "POST" action = "/register">
                <div class = "form-group">
                    <label for = "fullname">Full Name</label>
                    <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        placeholder="Enter your full name"
                        required>

                </div>

                 <div class = "form-group">
                    <label for = "email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email address"
                        required>

                </div>
                 <div class = "form-group">
                    <label for = "Password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a strong password"
                        required>

                </div>
                 <div class = "form-group">
                    <label for = "confirm_password">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confrim_password"
                        placeholder="Confirm your password"
                        required>

                </div>

                <button type = "submit" class = "btn-primary">Create Account</button>

            </form>

            <p class = "authorization-link">
                Already have an account?
                <a href = "login.html">Login here</a>
            </p>

        </div>


       
    </section>
    
    
    
</body>
</html>
